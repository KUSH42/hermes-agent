# ============================================================================
# Hermes Agent — Example Skin Template
# ============================================================================
#
# Copy this file to ~/.hermes/skins/<name>.yaml to create a custom skin.
# All fields are optional — missing values inherit from the default skin.
# Activate with: /skin <name>  or  display.skin: <name> in config.yaml
#
# See hermes_cli/skin_engine.py for the full schema reference.
# ============================================================================

# Required: unique skin name (used in /skin command and config)
name: example
description: An example custom skin — copy and modify this template

# ── Colors ──────────────────────────────────────────────────────────────────
# Hex color values for Rich markup. These control the CLI's visual palette.
colors:
  # Banner panel (the startup welcome box)
  banner_border: "#CD7F32"        # Panel border
  banner_title: "#FFD700"         # Panel title text
  banner_accent: "#FFBF00"        # Section headers (Available Tools, Skills, etc.)
  banner_dim: "#B8860B"           # Dim/muted text (separators, model info)
  banner_text: "#FFF8DC"          # Body text (tool names, skill names)

  # UI elements
  ui_accent: "#FFBF00"            # General accent color
  ui_label: "#4dd0e1"             # Labels
  ui_ok: "#4caf50"                # Success indicators
  ui_error: "#ef5350"             # Error indicators
  ui_warn: "#ffa726"              # Warning indicators

  # Input area
  prompt: "#FFF8DC"               # Prompt text color
  input_rule: "#CD7F32"           # Horizontal rule around input

  # Response box
  response_border: "#FFD700"      # Response box border (ANSI color)

  # Session display
  session_label: "#DAA520"        # Session label
  session_border: "#8B8682"       # Session ID dim color

  # TitledRule / PlainRule gradient tones (CLI + TUI)
  rule_start: "#555555"           # Gradient bright end
  rule_end: "#2A2A2A"             # Gradient dim end (should match app-bg)

  # Prompt_toolkit status bar (ANSI mode only — TUI uses component_vars)
  statusbar_bg: "#1a1a2e"         # Status bar background

  # Context bar / TUI indicators
  error_color: "#E06C75"          # Critical indicator
  warning_color: "#FFA726"        # Warning indicator
  caution_color: "#FFBF00"        # Caution indicator

# ── Spinner ─────────────────────────────────────────────────────────────────
# Customize the animated spinner shown during API calls and tool execution.
spinner:
  # TUI prompt spinner animation style.
  # Options: dots|bounce|grow|arrows|star|moon|pulse|clock|none
  # Omit or leave empty to use the display.spinner_style config value.
  style: dots

  # Faces shown while waiting for the API response
  waiting_faces:
    - "(｡◕‿◕｡)"
    - "(◕‿◕✿)"
    - "٩(◕‿◕｡)۶"

  # Faces shown during extended thinking/reasoning
  thinking_faces:
    - "(｡•́︿•̀｡)"
    - "(◔_◔)"
    - "(¬‿¬)"

  # Verbs used in spinner messages (e.g., "pondering your request...")
  thinking_verbs:
    - "pondering"
    - "contemplating"
    - "musing"
    - "ruminating"

  # Optional: left/right decorations around the spinner
  # Each entry is a [left, right] pair. Omit entirely for no wings.
  # wings:
  #   - ["⟪⚔", "⚔⟫"]
  #   - ["⟪▲", "▲⟫"]

# ── Branding ────────────────────────────────────────────────────────────────
# Text strings used throughout the CLI interface.
branding:
  agent_name: "Hermes Agent"          # Banner title, about display
  welcome: "Welcome! Type your message or /help for commands."
  goodbye: "Goodbye! ⚕"              # Exit message
  response_label: " ⚕ Hermes "       # Response box header label
  prompt_symbol: "❯ "                 # Input prompt symbol
  help_header: "(^_^)? Available Commands"  # /help header text

# ── Tool Output ─────────────────────────────────────────────────────────────
# Character used as the prefix for tool output lines.
# Default is "┊" (thin dotted vertical line). Some alternatives:
#   "╎" (light triple dash vertical)
#   "▏" (left one-eighth block)
#   "│" (box drawing light vertical)
#   "┃" (box drawing heavy vertical)
tool_prefix: "┊"

# ── Tool Icons ──────────────────────────────────────────────────────────────
# Per-tool glyph overrides. Nerd font glyphs preferred.
# tool_icons:
#   terminal: ""
#   web_search: ""
#   read_file: ""

# ── Banner Art ──────────────────────────────────────────────────────────────
# Rich-markup ASCII art. Lines must be padded to equal length with spaces
# before the closing [/] tag. Use |2- YAML block scalar for complex art.
# banner_logo: |
#   [bold #FFD700]MY LOGO[/]
# banner_hero: |
#   [bold #FFD700]  /\  [/]
#   [bold #FFBF00] /  \ [/]

# ── Syntax Highlighting ─────────────────────────────────────────────────────
# Named color scheme applied to fenced code blocks, inline code, and tool
# output highlights. The scheme controls the Pygments token → color mapping
# used by the Rich renderer.
#
# Built-in options:
#   hermes        — default Hermes palette (warm amber/gold truecolor)
#   monokai       — Wimer Hazenberg's Monokai (pink/green/yellow)
#   dracula       — Zeno Rocha's Dracula (purple/pink/green)
#   one-dark      — Atom One Dark / One Dark Pro
#   github-dark   — GitHub Primer dark theme
#   nord          — Arctic Ice Studio Nord (cool blues)
#   catppuccin    — Catppuccin Mocha (pastel)
#   tokyo-night   — enkia/tokyo-night-vscode-theme
#   gruvbox       — morhetz/gruvbox (warm retro)
#   solarized-dark — Ethan Schoonover's Solarized dark
syntax_scheme: monokai

# Optional per-token overrides on top of the named scheme.
# Token names: keyword, keyword_type, name, name_builtin, name_class,
#   name_function, name_function_magic, name_decorator, name_exception,
#   comment, string, string_doc, string_escape, string_regex, number,
#   operator, operator_word, error, diff_deleted, diff_inserted
# syntax:
#   keyword: "bold #FF79C6"
#   comment: "italic #6272A4"

# ── Diff Renderer Colors ────────────────────────────────────────────────────
# Background/foreground colors for git diff display. All *_bg/*_fg values
# MUST be 6-digit hex (#RRGGBB). Style keys accept Rich style strings.
# diff:
#   deletion_bg: "#781414"
#   addition_bg: "#145a14"
#   deletion_fg: "#ffffff"
#   addition_fg: "#ffffff"
#   intra_del_bg: "#9b1c1c"
#   intra_add_bg: "#166534"
#   intra_del_fg: "#ff8080"
#   intra_add_fg: "#80ff80"
#   line_number: "dim"
#   hunk_header: "bold cyan"
#   filename: "bold bright_white"
#   file_path_fg: "#B4A0FF"        # inline diff only
#   hunk_fg: "#787882"             # inline diff only
#   context_fg: "#969696"          # inline diff only

