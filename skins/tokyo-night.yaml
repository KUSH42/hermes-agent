name: tokyo-night
description: Tokyo Night — deep navy dark theme with blue-purple neon accents

fg:        "#c0caf5"
bg:        "#1a1b26"
accent:    "#7aa2f7"
accent-dim: "#3d5994"
success:   "#9ece6a"
warning:   "#e0af68"
error:     "#f7768e"
muted:     "#565f89"
border:    "#292e42"
selection: "#364a82"

glass-tint:   "#1a1b26"
glass-border: "#292e42"
glass-edge:   "#7aa2f7"

vars:
  preview-syntax-theme: "tokyo-night"

colors:
  banner_title:    "#7aa2f7"
  banner_accent:   "#bb9af7"
  banner_dim:      "#3d5994"
  banner_border:   "#292e42"
  banner_text:     "#c0caf5"
  input_rule:      "#7aa2f7"
  prompt:          "#bb9af7"
  response_border: "#7aa2f7"
  ui_accent:       "#bb9af7"
  ui_ok:           "#9ece6a"
  ui_error:        "#f7768e"
  ui_warn:         "#e0af68"

branding:
  agent_name:     "Hermes"
  welcome:        "All your dreams are in this city at night."
  goodbye:        "Goodnight. ⟁"
  response_label: " ⟁ Hermes "
  prompt_symbol:  "❯ "
  help_header:    "(⟁) Commands"

spinner:
  style: dots
  thinking_faces:
    - "(◈)"
    - "(⌁)"
    - "(◇)"
    - "(⊛)"
  waiting_faces:
    - "(·)"
    - "(.·)"
    - "(··)"
  thinking_verbs:
    - processing
    - thinking
    - analyzing
    - computing
    - reasoning

syntax_scheme: monokai

diff:
  deletion_bg:  "#2a1020"
  addition_bg:  "#0f2a1a"
  deletion_fg:  "#f7768e"
  addition_fg:  "#9ece6a"
  line_number:  "#565f89"
  hunk_header:  "bold #bb9af7"
  filename:     "bold #7aa2f7"

component_vars:
  app-bg:                      "#1a1b26"
  brand-glyph-color:           "#bb9af7"
  browse-code:                 "#9ece6a"
  browse-diff:                 "#bb9af7"
  browse-media:                "#73daca"
  browse-tool:                 "#7aa2f7"
  browse-turn:                 "#e0af68"
  chevron-base:                "#c0caf5"
  chevron-done:                "#9ece6a"
  chevron-error:               "#f7768e"
  chevron-file:                "#e0af68"
  chevron-shell:               "#9ece6a"
  chevron-stream:              "#7aa2f7"
  cite-chip-bg:                "#1f2335"
  cite-chip-fg:                "#7aa2f7"
  completion-empty-bg:         "#24283b"
  cursor-color:                "#c0caf5"
  cursor-placeholder:          "#444b6a"
  cursor-selection-bg:         "#33467c"
  diff-add-bg:                 "#0f2a1a"
  diff-del-bg:                 "#2a1020"
  drawille-canvas-color:       "#7aa2f7"
  footnote-ref-color:          "#565f89"
